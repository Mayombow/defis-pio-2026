<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8B5C6D"/>
      <stop offset="1" stop-color="#6E4351"/>
    </linearGradient>
    <linearGradient id="dome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFBF2"/>
      <stop offset="1" stop-color="#F2E7D2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F3D07A"/>
      <stop offset="1" stop-color="#E0A93B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.34" r="0.62">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="0" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- steam -->
  <g fill="none" stroke="#FBF6EC" stroke-width="11" stroke-linecap="round" opacity="0.5">
    <path d="M214 150 C198 132 230 116 214 96"/>
    <path d="M300 150 C284 132 316 116 300 96"/>
  </g>

  <!-- plate shadow -->
  <ellipse cx="256" cy="374" rx="176" ry="30" fill="#3B2F26" opacity="0.18"/>

  <!-- plate -->
  <ellipse cx="256" cy="366" rx="176" ry="30" fill="url(#gold)"/>
  <ellipse cx="256" cy="360" rx="176" ry="27" fill="url(#dome)"/>

  <!-- cloche dome -->
  <path d="M96 360 A160 176 0 0 1 416 360 Z" fill="url(#dome)"/>
  <!-- dome inner shading -->
  <path d="M96 360 A160 176 0 0 1 416 360 Z" fill="#3B2F26" opacity="0.06"/>
  <!-- dome highlight -->
  <path d="M150 336 A118 132 0 0 1 236 210" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" opacity="0.65"/>
  <!-- dome base ring -->
  <rect x="96" y="352" width="320" height="18" rx="9" fill="url(#gold)"/>

  <!-- knob -->
  <rect x="248" y="176" width="16" height="30" rx="8" fill="url(#gold)"/>
  <circle cx="256" cy="176" r="26" fill="url(#gold)"/>
  <circle cx="248" cy="169" r="8" fill="#ffffff" opacity="0.65"/>
</svg>
