<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FBF6EC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Dîner Presque Pio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Nunito+Sans:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TOKENS — palette "carnet de cuisine" pastel
   ============================================================ */
:root{
  --cream:#FBF6EC;        /* papier chaud */
  --cream-2:#F6EFE0;      /* carte */
  --cream-3:#EFE7D5;      /* surface creusée / inset */
  --ink:#382C22;          /* encre brun chaud */
  --ink-soft:#6E5D4E;     /* texte secondaire (contraste AA) */
  --ink-faint:#9C8C7B;    /* texte ténu */
  --line:#E6DAC4;         /* filets */
  --line-2:#D8C8AC;       /* filet appuyé */
  --sage:#7C9473;         /* accent herbe */
  --sage-d:#566E50;
  --apricot:#E39B5E;      /* accent appétit */
  --apricot-d:#C67F41;
  --plum:#764B5B;         /* vin / profondeur */
  --plum-2:#8B5C6D;
  --paprika:#C85A3C;      /* action chaude */
  --paprika-d:#AC482D;
  --gold:#E7B94E;         /* révélation */
  --gold-d:#C89A2C;
  /* couleurs d'équipe (issues du tableau) */
  --g1:#8FC7DD; --g1-soft:#DCEFF6;
  --g2:#EDB588; --g2-soft:#FBE7D6;
  --g3:#9FD8B4; --g3-soft:#E1F4E8;
  --shadow:0 20px 46px -22px rgba(56,44,34,.42);
  --shadow-s:0 8px 22px -14px rgba(56,44,34,.34);
  --shadow-xs:0 2px 8px -4px rgba(56,44,34,.30);
  --ring:0 0 0 3px rgba(124,148,115,.34);
  --radius:22px;
  --radius-s:15px;
  --radius-xs:11px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --ease:cubic-bezier(.2,.8,.2,1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--cream);
  color:var(--ink);
  font-family:'Nunito Sans',system-ui,sans-serif;
  font-size:16px;line-height:1.55;
  letter-spacing:.005em;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overscroll-behavior-y:none;
}
h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-weight:600;line-height:1.12;margin:0;
  font-optical-sizing:auto;letter-spacing:-.012em}
.mono{font-family:'Space Mono',monospace;font-feature-settings:"tnum" 1}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px;color:var(--ink)}
img{max-width:100%;display:block}

/* focus clavier visible & cohérent */
:focus-visible{outline:2.5px solid var(--plum);outline-offset:2px}
.btn:focus-visible{outline-color:var(--ink);outline-offset:3px}
.field:focus-visible{outline:none;border-color:var(--sage);box-shadow:var(--ring)}
.tabbar button:focus-visible,.subtab:focus-visible,.name-btn:focus-visible,
.stepper button:focus-visible,.rx button:focus-visible,.icon-btn:focus-visible,
.me-chip:focus-visible,.pill:focus-visible{outline:2.5px solid var(--plum);outline-offset:2px}

/* subtle paper grain */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.55;
  background-image:radial-gradient(rgba(120,100,80,.045) 1px,transparent 1px);
  background-size:4px 4px;
}

/* ============================================================
   LOADING (anti race-condition, comme défis-pio)
   ============================================================ */
#loading{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(120% 90% at 50% 12%,#FFFDF7,var(--cream) 62%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .45s ease;
}
#loading.hide{opacity:0;pointer-events:none}
.cloche-load{font-size:60px;animation:steam 2.2s ease-in-out infinite;
  filter:drop-shadow(0 14px 20px rgba(56,44,34,.20))}
@keyframes steam{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-8px) rotate(2deg)}}
#loading .lbl{font-family:'Fraunces',serif;font-size:19px;font-weight:500;color:var(--ink-soft);letter-spacing:.2px}
.dots span{animation:blink 1.2s infinite}.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

/* ============================================================
   LAYOUT
   ============================================================ */
#app{position:relative;z-index:1;max-width:520px;margin:0 auto;min-height:100vh;
     padding-bottom:calc(100px + var(--safe-b));display:none}
#app.ready{display:block}

header.top{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(var(--cream) 68%,rgba(251,246,236,.86) 88%,rgba(251,246,236,0));
  padding:16px 18px 12px;display:flex;align-items:center;gap:10px;
}
.brand{display:flex;flex-direction:column;line-height:1;gap:4px}
.brand .eyebrow{font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--apricot-d);font-weight:800}
.brand h1{font-size:24px;font-weight:900;margin-top:0}
.brand h1 em{font-style:italic;color:var(--plum)}
.top .me{margin-left:auto;display:flex;align-items:center;gap:8px}
.me-chip{display:flex;align-items:center;gap:7px;background:var(--cream-2);border:1px solid var(--line);
  padding:6px 12px 6px 7px;border-radius:100px;font-weight:800;font-size:14px;box-shadow:var(--shadow-xs);
  transition:transform .08s ease,box-shadow .2s}
.me-chip:active{transform:scale(.97)}
.me-chip .av{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;color:#fff;
  box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.35)}
.icon-btn{width:38px;height:38px;border-radius:50%;background:var(--cream-2);border:1px solid var(--line);
  display:grid;place-items:center;font-size:16px;box-shadow:var(--shadow-xs);transition:transform .08s ease}
.icon-btn:active{transform:scale(.94)}

main{padding:4px 16px 8px}
.screen{display:none;animation:fade .38s var(--ease)}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ============================================================
   CARDS & BITS
   ============================================================ */
.card{background:var(--cream-2);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow-s);padding:18px;margin-bottom:14px}
.section-title{display:flex;align-items:baseline;gap:10px;margin:26px 4px 13px}
.section-title h2{font-size:22px;font-weight:600}
.section-title .sub{font-size:12.5px;color:var(--ink-soft);margin-left:auto;font-weight:600}

.team-tag{display:inline-flex;align-items:center;gap:7px;font-weight:800;font-size:13px;
  padding:5px 12px;border-radius:100px;color:var(--ink)}
.dot{width:10px;height:10px;border-radius:50%;flex:none;box-shadow:inset 0 0 0 1px rgba(56,44,34,.10)}

.pill{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:100px;
  background:var(--cream);border:1px solid var(--line);color:var(--ink-soft)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:var(--paprika);color:#fff;font-weight:800;font-size:15px;letter-spacing:.01em;
  padding:14px 18px;border-radius:14px;box-shadow:0 10px 22px -12px rgba(200,90,60,.7),var(--shadow-xs);width:100%;
  transition:transform .08s ease,filter .2s,box-shadow .2s}
.btn:hover{filter:brightness(1.04)}
.btn:active{transform:translateY(1px) scale(.99)}
.btn.ghost{background:var(--cream);color:var(--ink);border:1px solid var(--line-2);box-shadow:var(--shadow-xs)}
.btn.sage{background:var(--sage);box-shadow:0 10px 22px -12px rgba(86,110,80,.7),var(--shadow-xs)}
.btn:disabled{filter:grayscale(.55);opacity:.5;box-shadow:none;cursor:not-allowed}
.btn.small{width:auto;padding:9px 15px;font-size:13px;border-radius:11px}

.field{width:100%;background:var(--cream);border:1.5px solid var(--line);border-radius:12px;
  padding:12px 13px;outline:none;transition:border-color .15s,box-shadow .15s;line-height:1.4}
.field::placeholder{color:var(--ink-faint)}
.field:focus{border-color:var(--sage);box-shadow:var(--ring)}
textarea.field{resize:vertical;min-height:44px}
label.lab{font-size:12px;font-weight:800;color:var(--ink-soft);letter-spacing:.04em;
  text-transform:uppercase;display:block;margin:0 2px 6px}

.empty{text-align:center;color:var(--ink-soft);padding:28px 16px;font-size:14.5px}
.empty .big{font-size:36px;display:block;margin-bottom:10px;opacity:.9}

/* ============================================================
   NAV (bottom, pouce-friendly)
   ============================================================ */
nav.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:60;
  padding:9px 10px calc(9px + var(--safe-b));
  display:flex;gap:4px;justify-content:space-around;
  background:rgba(251,246,236,.9);backdrop-filter:blur(14px) saturate(1.2);
  border-top:1px solid var(--line);max-width:520px;margin:0 auto;
  box-shadow:0 -10px 30px -22px rgba(56,44,34,.5);
}
.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:7px 2px;border-radius:13px;color:var(--ink-soft);font-weight:800;font-size:10.5px;letter-spacing:.01em;
  transition:color .18s,background .18s}
.tabbar button .ico{font-size:21px;line-height:1;transition:transform .2s var(--ease)}
.tabbar button.active{color:var(--paprika-d)}
.tabbar button.active .ico{transform:translateY(-2px) scale(1.1)}
.tabbar button.active{background:rgba(200,90,60,.10)}

/* ============================================================
   NAME PICKER (overlay)
   ============================================================ */
#whois{position:fixed;inset:0;z-index:300;overflow-y:auto;
  background:radial-gradient(120% 80% at 50% 0%,#FFFDF7,var(--cream) 60%);
  padding:40px 20px calc(30px + var(--safe-b));display:none}
#whois.show{display:block}
#whois h2{font-size:29px;text-align:center;font-weight:600}
#whois .lead{text-align:center;color:var(--ink-soft);margin:10px auto 28px;font-size:15px;max-width:330px}
.grp-block{margin-bottom:22px}
.grp-block .head{display:flex;align-items:center;gap:8px;margin:0 4px 11px;font-weight:800;font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em}
.name-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.name-btn{display:flex;align-items:center;gap:11px;background:var(--cream-2);border:1.5px solid var(--line);
  border-radius:15px;padding:13px 13px;font-weight:800;font-size:15px;text-align:left;box-shadow:var(--shadow-xs);
  transition:transform .09s ease,border-color .15s,box-shadow .2s}
.name-btn:hover{border-color:var(--line-2)}
.name-btn:active{transform:scale(.96)}
.name-btn .av{width:32px;height:32px;border-radius:50%;flex:none;display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800;
  box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.35)}

/* ============================================================
   MENUS
   ============================================================ */
.menu-hero{border-radius:var(--radius-s);overflow:hidden;background:var(--cream-3);
  border:1px solid var(--line);margin:-2px -2px 14px;aspect-ratio:16/10;position:relative}
.menu-hero img{width:100%;height:100%;object-fit:cover}
.menu-hero .ph{position:absolute;inset:0;display:grid;place-items:center;color:var(--ink-faint);font-size:13.5px;gap:8px;
  flex-direction:column;text-align:center;padding:0 24px;
  background-image:linear-gradient(135deg,rgba(214,200,172,.18) 25%,transparent 25%,transparent 50%,rgba(214,200,172,.18) 50%,rgba(214,200,172,.18) 75%,transparent 75%,transparent);
  background-size:16px 16px}
.plat-row{padding:13px 0;border-top:1px dashed var(--line-2)}
.plat-row:first-of-type{border-top:none}
.plat-row .ptop{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.plat-row .pcat{font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft)}
.plat-row .ptxt{font-family:'Fraunces',serif;font-size:16.5px;line-height:1.35;color:var(--ink)}
.plat-row .ptxt.empty-txt{color:var(--ink-faint);font-style:italic;font-family:'Nunito Sans',sans-serif}
.plat-thumb{width:100%;border-radius:12px;margin-top:9px;border:1px solid var(--line)}
.edit-hint{font-size:12px;color:var(--ink-soft);margin-top:10px;text-align:center}
.uploading{font-size:12.5px;color:var(--sage-d);font-weight:800;text-align:center;padding:7px}

/* ============================================================
   VOTER
   ============================================================ */
.subtabs{display:flex;gap:8px;margin:2px 0 16px;position:sticky;top:60px;z-index:40;
  padding:4px 0;background:linear-gradient(var(--cream) 68%,rgba(251,246,236,0))}
.subtab{flex:1;padding:11px 6px;border-radius:14px;font-weight:800;font-size:13px;
  border:1.5px solid var(--line);background:var(--cream-2);color:var(--ink-soft);
  display:flex;flex-direction:column;align-items:center;gap:4px;transition:.18s var(--ease)}
.subtab .dot{width:8px;height:8px}
.subtab.active{color:var(--ink);border-color:transparent;box-shadow:var(--shadow-s);transform:translateY(-1px)}
.subtab.locked{opacity:.45;cursor:default}

.vote-cat{margin-bottom:14px}
.vote-cat .cathead{display:flex;align-items:center;gap:9px;margin-bottom:3px}
.vote-cat .catname{font-family:'Fraunces',serif;font-size:20px;font-weight:600}
.vote-cat .catmenu{color:var(--ink-soft);font-size:14px;line-height:1.4;margin:3px 0 0}
.vote-cat .catmenu.none{font-style:italic;color:var(--ink-faint)}
.progress-mini{display:flex;align-items:center;gap:8px;margin:11px 0 2px;font-size:12px;color:var(--ink-soft);font-weight:800}
.progress-mini .bar{flex:1;height:7px;border-radius:100px;background:var(--cream-3);border:1px solid var(--line);overflow:hidden}
.progress-mini .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--sage),var(--sage-d));border-radius:100px;transition:width .5s var(--ease)}

.rate{margin-top:13px}
.rate .rlab{display:flex;justify-content:space-between;align-items:baseline;font-weight:800;font-size:13px;margin-bottom:6px}
.rate .rlab b{font-family:'Space Mono',monospace;color:var(--paprika-d);font-size:15px}
.stepper{display:flex;gap:5px}
.stepper button{flex:1;height:36px;border-radius:10px;background:var(--cream);border:1.5px solid var(--line);
  font-weight:700;font-size:13px;color:var(--ink-soft);transition:.14s var(--ease);font-family:'Space Mono',monospace}
.stepper button:active{transform:scale(.92)}
.stepper button.on{background:var(--sage);border-color:var(--sage);color:#fff;box-shadow:var(--shadow-xs)}
.stepper.g button.on{background:var(--apricot);border-color:var(--apricot);color:var(--ink)}
.stepper.v button.on{background:var(--plum);border-color:var(--plum);color:#fff}
.stepper.p button.on{background:var(--sage);border-color:var(--sage);color:#fff}

.voted-badge{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--sage),var(--sage-d));color:#fff;
  padding:11px 14px;border-radius:13px;font-weight:800;font-size:14px;margin-top:11px;box-shadow:var(--shadow-xs)}
.voted-badge .sc{margin-left:auto;font-family:'Space Mono',monospace;background:rgba(255,255,255,.2);padding:2px 9px;border-radius:100px;font-size:12.5px}
.lock-note{text-align:center;color:var(--ink-soft);font-size:14px;padding:36px 22px;line-height:1.5}

/* comments / reactions */
.thread{margin-top:14px;border-top:1px dashed var(--line-2);padding-top:13px}
.thread .rx{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.rx button{display:flex;align-items:center;gap:5px;background:var(--cream);border:1.5px solid var(--line);
  border-radius:100px;padding:6px 11px;font-size:14px;font-weight:800;color:var(--ink-soft);transition:.14s var(--ease)}
.rx button:active{transform:scale(.9)}
.rx button.on{background:var(--g2-soft);border-color:var(--apricot);color:var(--ink)}
.rx button .n{font-family:'Space Mono',monospace;font-size:12px}
.cmt{display:flex;gap:9px;padding:8px 0}
.cmt .av{width:28px;height:28px;border-radius:50%;flex:none;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:800;
  box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.3)}
.cmt .body{flex:1}
.cmt .who{font-weight:800;font-size:13px}
.cmt .txt{font-size:14px;color:var(--ink);line-height:1.45}
.cmt-add{display:flex;gap:8px;margin-top:10px}
.cmt-add .field{flex:1;min-height:42px}

/* ============================================================
   CLASSEMENT — sous cloche + reveal
   ============================================================ */
.cloche-wrap{text-align:center;padding:40px 16px 12px;position:relative}
.cloche-wrap::before{content:"";position:absolute;top:14px;left:50%;transform:translateX(-50%);
  width:230px;height:230px;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(231,185,78,.22),transparent 68%)}
.cloche{font-size:100px;line-height:1;position:relative;
  filter:drop-shadow(0 18px 24px rgba(56,44,34,.24));animation:steam 3s ease-in-out infinite}
.cloche-wrap h2{font-size:28px;margin-top:16px}
.cloche-wrap p{color:var(--ink-soft);margin:12px auto 0;max-width:330px;font-size:15px;line-height:1.5}
.mijote{display:inline-flex;gap:14px;margin-top:24px;flex-wrap:wrap;justify-content:center}
.mijote .stat{background:var(--cream-2);border:1px solid var(--line);border-radius:16px;padding:14px 18px;min-width:100px;box-shadow:var(--shadow-xs)}
.mijote .stat b{display:block;font-family:'Space Mono',monospace;font-size:26px;color:var(--plum)}
.mijote .stat span{font-size:11px;color:var(--ink-soft);font-weight:800;text-transform:uppercase;letter-spacing:.06em}

.podium{display:flex;align-items:flex-end;justify-content:center;gap:9px;margin:10px 0 26px;min-height:220px}
.pod{flex:1;max-width:120px;display:flex;flex-direction:column;align-items:center;
  animation:rise .7s cubic-bezier(.2,.9,.3,1.2) both}
.pod .medal{font-size:32px;margin-bottom:5px;filter:drop-shadow(0 4px 6px rgba(56,44,34,.2))}
.pod .pname{font-family:'Fraunces',serif;font-weight:700;font-size:15px;text-align:center;line-height:1.2}
.pod .pscore{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:var(--ink-soft);margin-top:2px}
.pod .block{width:100%;border-radius:14px 14px 0 0;margin-top:9px;display:grid;place-items:center;position:relative;overflow:hidden;
  color:rgba(56,44,34,.55);font-family:'Fraunces',serif;font-size:36px;font-weight:900;border:1px solid var(--line);border-bottom:none;
  box-shadow:inset 0 2px 0 rgba(255,255,255,.4)}
.pod .block::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.28),transparent 42%)}
.pod.r1 .block{height:156px}.pod.r2 .block{height:116px}.pod.r3 .block{height:86px}
.pod.r1 .medal{font-size:38px;animation:medalPop .9s .3s both}
.pod.r1 .block::before{content:"";position:absolute;top:-40%;left:-60%;width:60%;height:180%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);
  transform:skewX(-20deg);animation:shine 2.6s ease-in-out 1s infinite}
@keyframes rise{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:none}}
@keyframes medalPop{0%{transform:scale(0) rotate(-25deg)}60%{transform:scale(1.25) rotate(8deg)}100%{transform:scale(1) rotate(0)}}
@keyframes shine{0%,100%{left:-60%}55%,100%{left:130%}}

.best-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:4px}
.best-card{background:var(--cream-2);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--shadow-xs)}
.best-card .cat{font-size:11px;font-weight:800;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em}
.best-card .win{font-family:'Fraunces',serif;font-weight:700;font-size:16px;margin-top:5px;display:flex;align-items:center;gap:7px}
.best-card .sc{font-family:'Space Mono',monospace;font-size:12.5px;color:var(--plum);margin-top:3px}

.breakdown{margin-top:8px}
.bd-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px dashed var(--line-2)}
.bd-row .lbl{font-weight:800;width:82px;font-size:13px}
.bd-row .bar{flex:1;height:10px;border-radius:100px;background:var(--cream-3);border:1px solid var(--line);overflow:hidden}
.bd-row .bar>i{display:block;height:100%;border-radius:100px;transition:width .6s var(--ease)}

  background:var(--ink);color:var(--cream);padding:12px 20px;border-radius:100px;font-weight:800;font-size:14px;

  border-radius:26px 26px 0 0;padding:22px 20px calc(24px + var(--safe-b));transform:translateY(100%);
  transition:transform .34s var(--ease);box-shadow:0 -14px 44px -18px rgba(0,0,0,.42)}

.sheet .grab{width:42px;height:4px;border-radius:100px;background:var(--line-2);margin:0 auto 18px}

.banner{background:var(--g2-soft);border:1px solid var(--apricot);border-radius:13px;padding:11px 14px;
  font-size:13px;font-weight:700;margin:0 16px 12px;display:flex;gap:9px;align-items:center;line-height:1.45}

@media (max-width:360px){ .name-grid{grid-template-columns:1fr} }

}

<script>
/* ============================================================
   CONFIG
   ============================================================ */
// ⬇️ COLLE ICI l'URL /exec de ton déploiement Apps Script.
//    Laisse vide pour tester l'interface en local (1 appareil).
const BACKEND_URL = '';

const GROUPS = [
  { id:'g1', name:'Équipe 1', color:'#8FC7DD', soft:'#DCEFF6', members:['Kaï','Tegu','Azandica'] },
  { id:'g2', name:'Équipe 2', color:'#EDB588', soft:'#FBE7D6', members:['Caligatta','Saïmiri','Shikra'] },
  { id:'g3', name:'Équipe 3', color:'#9FD8B4', soft:'#E1F4E8', members:['Kermodeï','Ocicat','Tamia'] }
];
const STAFF = ['Jaguarundi','Frenata','Galidie','Izard'];
const CATS = [
  { id:'entree',  label:'Entrée',  emoji:'🥗' },
  { id:'plat',    label:'Plat',    emoji:'🍽️' },
  { id:'dessert', label:'Dessert', emoji:'🍰' },
  { id:'boisson', label:'Boisson', emoji:'🍹' }
];
const RX_SET = ['😋','🔥','👏','😮','❤️'];
const CRIT = { gout:{max:10,label:'Goût'}, visuel:{max:5,label:'Visuel'}, pres:{max:5,label:'Présentation'} };
const CAT_MAX = 20; // 10+5+5
const TOTAL_MAX = 80; // 4 cats

/* ============================================================
   STATE
   ============================================================ */
let EVENTS = [];
let MODEL = {};
let stateReady = false;
let me = null;
let currentTab = 'accueil';
let currentVoteGroup = 'g1';
let isChef = false;           // débloqué via code
let pollTimer = null;
const localDraft = {};        // brouillons de vote non validés

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
const byId = id => document.getElementById(id);
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const groupById = id => GROUPS.find(g=>g.id===id);
const allPeople = () => [...GROUPS.flatMap(g=>g.members), ...STAFF];
const myGroup = () => GROUPS.find(g=>g.members.includes(me));
const isStaff = n => STAFF.includes(n);
function initials(n){ return (n||'?').slice(0,2).toUpperCase(); }
function avatarColor(n){
  const g = GROUPS.find(g=>g.members.includes(n));
  if(g) return g.color;
  return '#764B5B';
}
function eligibleCount(gid){ return allPeople().length - groupById(gid).members.length; } // 13-3 = 10
function canVoteGroup(gid){ const g=myGroup(); return !(g && g.id===gid); }

function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ============================================================
   STORE — réseau (Apps Script) ou local (aperçu)
   ============================================================ */
const OFFLINE = !BACKEND_URL;
const LS_KEY = 'dpp_events_v1';

async function fetchState(){
  if(OFFLINE){
    try{ EVENTS = JSON.parse(localStorage.getItem(LS_KEY)||'[]'); }catch(e){ EVENTS=[]; }
    return;
  }
  const r = await fetch(BACKEND_URL, {method:'GET'});
  const d = await r.json();
  if(d && d.ok) EVENTS = d.events||[];
}

async function pushEvent(type, payload){
  if(!stateReady){ toast('Patiente, connexion en cours…'); return {ok:false}; }
  const ev = { id: uuid(), ts: Date.now(), type, payload };
  if(OFFLINE){
    // verrou métier local : un vote unique
    if(type==='vote' && MODEL.votes[voteKey(payload.voter,payload.group,payload.cat)])
      return {ok:false,error:'already_voted'};
    EVENTS.push(ev); saveLocal(); rebuild();
    return {ok:true};
  }
  // optimiste : on ajoute puis on confirme via refetch
  try{
    const r = await fetch(BACKEND_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action:'append', event:ev})
    });
    const d = await r.json().catch(()=>({ok:true}));
    if(d && d.ok===false && d.error==='already_voted'){ EVENTS=d.events||EVENTS; rebuild(); return d; }
    if(d && d.events) EVENTS=d.events;
    rebuild();
    return d||{ok:true};
  }catch(e){
    // fallback : on garde l'événement en attendant le prochain poll
    EVENTS.push(ev); rebuild();
    return {ok:true, queued:true};
  }
}

async function uploadPhoto(file){
  const dataUrl = await compressImage(file);
  if(OFFLINE){ return {ok:true, src:dataUrl}; }        // stocke le dataURL directement
  const base64 = dataUrl.split(',')[1];
  const r = await fetch(BACKEND_URL,{
    method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({action:'photo', data:base64, mime:'image/jpeg', name:'plat_'+Date.now()+'.jpg'})
  });
  const d = await r.json();
  if(d && d.ok) return {ok:true, fileId:d.fileId};
  return {ok:false};
}

function saveLocal(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(EVENTS)); }catch(e){} }
function sig(){ return EVENTS.length+'|'+(EVENTS.length?EVENTS[EVENTS.length-1].id:''); }
function uuid(){ return 'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

/* compression canvas (mobile-friendly, ~1280px, jpeg .82) */
function compressImage(file){
  return new Promise((res,rej)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{
      const max=1280; let {width:w,height:h}=img;
      if(w>h && w>max){ h=h*max/w; w=max; } else if(h>=w && h>max){ w=w*max/h; h=max; }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      res(c.toDataURL('image/jpeg',0.82));
    };
    img.onerror=rej; img.src=url;
  });
}
function photoSrc(p){
  if(!p) return null;
  if(p.src) return p.src;                                   // dataURL local
  if(p.fileId) return 'https://drive.google.com/thumbnail?id='+p.fileId+'&sz=w1000';
  return null;
}

/* ============================================================
   FOLD — journal → modèle calculé
   ============================================================ */
function voteKey(v,g,c){ return v+'|'+g+'|'+c; }
function rebuild(){
  const m = { menus:{}, expenses:[], votes:{}, comments:[], reactions:{}, config:{revealed:false} };
  GROUPS.forEach(g=>{ m.menus[g.id]={}; CATS.forEach(c=>m.menus[g.id][c.id]={text:'',photo:null}); });
  const sorted=[...EVENTS].sort((a,b)=>(a.ts||0)-(b.ts||0));
  const delExp=new Set();
  for(const e of sorted){
    const p=e.payload||{};
    switch(e.type){
      case 'vote':
        m.votes[voteKey(p.voter,p.group,p.cat)]={voter:p.voter,group:p.group,cat:p.cat,gout:+p.gout,visuel:+p.visuel,pres:+p.pres,comment:p.comment||'',ts:e.ts};
        if(p.comment) m.comments.push({id:e.id,author:p.voter,group:p.group,cat:p.cat,text:p.comment,ts:e.ts,fromVote:true});
        break;
      case 'comment':
        m.comments.push({id:e.id,author:p.author,group:p.group,cat:p.cat,text:p.text,ts:e.ts});
        break;
      case 'reaction':{
        const k=p.group+'|'+p.cat; m.reactions[k]=m.reactions[k]||{};
        m.reactions[k][p.emoji]=m.reactions[k][p.emoji]||new Set();
        if(m.reactions[k][p.emoji].has(p.voter)) m.reactions[k][p.emoji].delete(p.voter);
        else m.reactions[k][p.emoji].add(p.voter);
        break; }
      case 'expense':
        m.expenses.push({id:p.id||e.id,group:p.group,label:p.label,amount:+p.amount,ts:e.ts});
        break;
      case 'expense_delete': delExp.add(p.targetId); break;
      case 'menu':
        if(m.menus[p.group] && m.menus[p.group][p.cat]){
          if(p.field==='text') m.menus[p.group][p.cat].text=p.value;
          if(p.field==='photo') m.menus[p.group][p.cat].photo=p.value;
        }
        break;
      case 'config': m.config[p.key]=p.value; break;
    }
  }
  m.expenses=m.expenses.filter(x=>!delExp.has(x.id));
  MODEL=m;
  renderAll();
}

/* ---------- scoring ---------- */
function catScores(gid,cid){
  const list=Object.values(MODEL.votes).filter(v=>v.group===gid&&v.cat===cid);
  if(!list.length) return {n:0,gout:0,visuel:0,pres:0,total:0};
  const avg=k=>list.reduce((s,v)=>s+(v[k]||0),0)/list.length;
  const g=avg('gout'),vi=avg('visuel'),pr=avg('pres');
  return {n:list.length,gout:g,visuel:vi,pres:pr,total:g+vi+pr};
}
function groupTotal(gid){ return CATS.reduce((s,c)=>s+catScores(gid,c.id).total,0); }
function groupVoterCount(gid){ const s=new Set(); Object.values(MODEL.votes).forEach(v=>{if(v.group===gid)s.add(v.voter);}); return s.size; }
function catProgress(gid,cid){ return Object.values(MODEL.votes).filter(v=>v.group===gid&&v.cat===cid).length; }

/* ============================================================
   RENDER
   ============================================================ */
function renderAll(){
  if(!stateReady) return;
  renderMeChip();
  renderAccueil(); renderMenus(); renderVoter(); renderClassement();
  if($('#admin-sheet').classList.contains('_open')) renderAdmin();
}
function renderMeChip(){
  $('#me-av').textContent=initials(me); $('#me-av').style.background=avatarColor(me);
  $('#me-name').textContent=me||'…';
}

/* ---------- ACCUEIL ---------- */
function renderAccueil(){
  const mg=myGroup();
  const votable=GROUPS.filter(g=>canVoteGroup(g.id));
  let done=0,tot=votable.length*CATS.length;
  votable.forEach(g=>CATS.forEach(c=>{ if(MODEL.votes[voteKey(me,g.id,c.id)]) done++; }));
  const revealed=MODEL.config.revealed;

  let html=`
  <div class="card" style="background:linear-gradient(135deg,var(--plum),#8b5c6d);color:#fbf3ee;border:none">
    <div style="font-size:12px;letter-spacing:.2em;text-transform:uppercase;opacity:.8;font-weight:800">Ta soirée</div>
    <h2 style="color:#fff;font-size:24px;margin:6px 0 2px">Bonjour ${esc(me)} 👋</h2>
    <p style="opacity:.9;font-size:14px;margin:0">
      ${mg? `Tu cuisines pour <b>${esc(mg.name)}</b> — tu notes les 2 autres équipes.`
           : `Tu fais partie du jury — tu notes les 3 équipes.`}
    </p>
    <div style="display:flex;align-items:center;gap:12px;margin-top:14px">
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:800;opacity:.9;margin-bottom:5px">
          <span>Tes votes</span><span class="mono">${done}/${tot}</span>
        </div>
        <div style="height:8px;background:rgba(255,255,255,.22);border-radius:100px;overflow:hidden">
          <i style="display:block;height:100%;width:${tot?done/tot*100:0}%;background:var(--gold);border-radius:100px;transition:width .5s"></i>
        </div>
      </div>
    </div>
  </div>`;

  html+=`<div class="section-title"><h2>Les équipes</h2><span class="sub">3 × 3 cuistots</span></div>`;
  GROUPS.forEach(g=>{
    const mine=mg&&mg.id===g.id;
    html+=`<div class="card" style="border-left:5px solid ${g.color}">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:8px">
        <span class="team-tag" style="background:${g.soft}"><span class="dot" style="background:${g.color}"></span>${esc(g.name)}</span>
        ${mine?'<span class="pill" style="border-color:var(--sage);color:var(--sage-d)">ton équipe</span>':''}
      </div>
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        ${g.members.map(n=>`<span class="pill" style="display:inline-flex;align-items:center;gap:6px">
          <span style="width:18px;height:18px;border-radius:50%;background:${g.color};display:inline-grid;place-items:center;color:#fff;font-size:9px;font-weight:800">${initials(n)}</span>${esc(n)}</span>`).join('')}
      </div>
    </div>`;
  });

  html+=`<div class="card" style="text-align:center">
    <div style="font-size:30px">${revealed?'🏆':'🍽️'}</div>
    <h3 style="font-size:18px;margin:6px 0 4px">${revealed?'Les résultats sont tombés !':'Résultats sous cloche'}</h3>
    <p style="color:var(--ink-soft);font-size:14px;margin:0 0 12px">${revealed?'Découvre le podium et les meilleurs plats.':'Le classement reste secret jusqu’à la révélation par les chefs. 🤫'}</p>
    <button class="btn ${revealed?'':'ghost'}" onclick="go('classement')">${revealed?'Voir le podium':'Aller au suspense'}</button>
  </div>`;

  $('#scr-accueil').innerHTML=html;
}

/* ---------- MENUS ---------- */
function canEditMenu(gid){ const g=myGroup(); return isChef || (g&&g.id===gid); }
function renderMenus(){
  let html=`<div class="section-title"><h2>Les menus</h2><span class="sub">entrée · plat · dessert · boisson</span></div>`;
  GROUPS.forEach(g=>{
    const editable=canEditMenu(g.id);
    // hero = première photo dispo
    let hero=null; for(const c of CATS){ const s=photoSrc(MODEL.menus[g.id][c.id].photo); if(s){hero=s;break;} }
    html+=`<div class="card" style="border-top:5px solid ${g.color}">
      <div class="menu-hero">
        ${hero?`<img src="${hero}" alt="">`:`<div class="ph"><span style="font-size:30px">📷</span>${editable?'Ajoute une photo à un plat ci-dessous':'Pas encore de photo'}</div>`}
      </div>
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:4px">
        <span class="team-tag" style="background:${g.soft}"><span class="dot" style="background:${g.color}"></span>${esc(g.name)}</span>
        ${editable?'<span class="pill" style="border-color:var(--sage);color:var(--sage-d);margin-left:auto">✏️ modifiable</span>':''}
      </div>`;
    CATS.forEach(c=>{
      const cell=MODEL.menus[g.id][c.id]; const psrc=photoSrc(cell.photo);
      html+=`<div class="plat-row">
        <div class="ptop"><span>${c.emoji}</span><span class="pcat">${c.label}</span>
          ${editable?`<label class="pill" style="margin-left:auto;cursor:pointer">📷
            <input type="file" accept="image/*" style="display:none" onchange="menuPhoto(event,'${g.id}','${c.id}')"></label>`:''}
        </div>`;
      if(editable){
        html+=`<textarea class="field" rows="1" placeholder="Décris ton ${c.label.toLowerCase()}…"
                 onchange="menuText(this,'${g.id}','${c.id}')">${esc(cell.text)}</textarea>`;
      }else{
        html+=`<div class="ptxt ${cell.text?'':'empty-txt'}">${cell.text?esc(cell.text):'À venir…'}</div>`;
      }
      if(psrc) html+=`<img class="plat-thumb" src="${psrc}" alt="">`;
      html+=`<div class="uploading" id="up-${g.id}-${c.id}" style="display:none">📤 Envoi de la photo…</div>`;
      html+=`</div>`;
    });
    if(!editable) html+=`<div class="edit-hint">Seule ${esc(g.name)} (ou un chef) peut éditer ce menu.</div>`;
    html+=`</div>`;
  });
  $('#scr-menus').innerHTML=html;
}
async function menuText(el,gid,cid){
  await pushEvent('menu',{group:gid,cat:cid,field:'text',value:el.value.trim()});
}
async function menuPhoto(ev,gid,cid){
  const f=ev.target.files&&ev.target.files[0]; if(!f) return;
  const up=$('#up-'+gid+'-'+cid); up.style.display='block';
  try{
    const r=await uploadPhoto(f);
    if(r.ok){
      await pushEvent('menu',{group:gid,cat:cid,field:'photo',value: r.src?{src:r.src}:{fileId:r.fileId}});
      toast('Photo ajoutée 📸');
    }else toast('Échec de l’envoi');
  }catch(e){ toast('Échec de l’envoi'); }
  up.style.display='none'; ev.target.value='';
}

/* ---------- VOTER ---------- */
function renderVoter(){
  // sous-onglets par équipe
  let tabs=`<div class="subtabs">`;
  GROUPS.forEach(g=>{
    const lock=!canVoteGroup(g.id);
    const active=currentVoteGroup===g.id;
    tabs+=`<button class="subtab ${active?'active':''} ${lock?'locked':''}"
        style="${active?`background:${g.soft}`:''}"
        onclick="${lock?'':`selectVoteGroup('${g.id}')`}">
        <span class="dot" style="background:${g.color}"></span>${esc(g.name)}${lock?' 🔒':''}</button>`;
  });
  tabs+=`</div>`;

  // si le groupe courant est verrouillé, bascule sur un votable
  if(!canVoteGroup(currentVoteGroup)){
    const alt=GROUPS.find(g=>canVoteGroup(g.id)); if(alt) currentVoteGroup=alt.id;
  }
  const g=groupById(currentVoteGroup);
  let body='';
  if(!canVoteGroup(g.id)){
    body=`<div class="lock-note">🔒 Tu ne peux pas noter ta propre équipe.</div>`;
  }else{
    CATS.forEach(c=>{ body+=voteCatCard(g,c); });
  }
  $('#scr-voter').innerHTML=tabs+body;
}
function selectVoteGroup(gid){ currentVoteGroup=gid; renderVoter(); }

function voteCatCard(g,c){
  const menu=MODEL.menus[g.id][c.id];
  const existing=MODEL.votes[voteKey(me,g.id,c.id)];
  const prog=catProgress(g.id,c.id), elig=eligibleCount(g.id);
  const dk=voteKey(me,g.id,c.id);
  const draft=localDraft[dk]||{gout:null,visuel:null,pres:null};
  const psrc=photoSrc(menu.photo);

  let h=`<div class="card vote-cat">
    <div class="cathead"><span style="font-size:20px">${c.emoji}</span><span class="catname">${c.label}</span></div>
    <p class="catmenu ${menu.text?'':'none'}">${menu.text?esc(menu.text):'Menu pas encore renseigné'}</p>
    ${psrc?`<img class="plat-thumb" src="${psrc}" style="margin-top:8px" alt="">`:''}
    <div class="progress-mini"><span>${prog}/${elig} ont noté</span>
      <span class="bar"><i style="width:${elig?prog/elig*100:0}%"></i></span></div>`;

  if(existing){
    h+=`<div class="voted-badge">✓ Ton vote est enregistré
        <span class="sc">${existing.gout}·${existing.visuel}·${existing.pres} = ${(existing.gout+existing.visuel+existing.pres)}/20</span></div>`;
  }else{
    h+=stepper('gout',g.id,c.id,draft.gout)+stepper('visuel',g.id,c.id,draft.visuel)+stepper('pres',g.id,c.id,draft.pres);
    h+=`<textarea class="field" id="vc-${dk}" rows="1" placeholder="Un petit commentaire ? (visible en direct)" style="margin-top:11px">${esc(draft.comment||'')}</textarea>`;
    const ready=draft.gout!=null&&draft.visuel!=null&&draft.pres!=null;
    h+=`<button class="btn" style="margin-top:10px" ${ready?'':'disabled'} onclick="submitVote('${g.id}','${c.id}')">
        ${ready?'Valider mon vote 🔒':'Note les 3 critères'}</button>
        <div style="text-align:center;font-size:11.5px;color:var(--ink-soft);margin-top:6px">Le vote est définitif une fois validé.</div>`;
  }
  h+=thread(g.id,c.id);
  h+=`</div>`;
  return h;
}
function stepper(crit,gid,cid,val){
  const {max,label}=CRIT[crit];
  const cls=crit==='gout'?'g':crit==='visuel'?'v':'p';
  let btns='';
  for(let i=1;i<=max;i++){
    btns+=`<button class="${val===i?'on':''}" onclick="setDraft('${gid}','${cid}','${crit}',${i})">${i}</button>`;
  }
  return `<div class="rate"><div class="rlab"><span>${label}</span><b>${val!=null?val:'–'}/${max}</b></div>
    <div class="stepper ${cls}">${btns}</div></div>`;
}
function setDraft(gid,cid,crit,val){
  const k=voteKey(me,gid,cid);
  localDraft[k]=localDraft[k]||{gout:null,visuel:null,pres:null,comment:''};
  const cmt=byId('vc-'+k); if(cmt) localDraft[k].comment=cmt.value;
  localDraft[k][crit]=val;
  renderVoter();
}
async function submitVote(gid,cid){
  const k=voteKey(me,gid,cid); const d=localDraft[k]||{};
  if(d.gout==null||d.visuel==null||d.pres==null){ toast('Note les 3 critères'); return; }
  const cmt=byId('vc-'+k); const comment=cmt?cmt.value.trim():'';
  const r=await pushEvent('vote',{voter:me,group:gid,cat:cid,gout:d.gout,visuel:d.visuel,pres:d.pres,comment});
  if(r.ok){ delete localDraft[k]; toast('Vote validé ✓'); }
  else if(r.error==='already_voted'){ toast('Déjà voté pour ce plat'); }
  else toast('Oups, réessaie');
}

/* comments + reactions thread */
function thread(gid,cid){
  const k=gid+'|'+cid;
  const rx=MODEL.reactions[k]||{};
  const cmts=MODEL.comments.filter(x=>x.group===gid&&x.cat===cid).sort((a,b)=>a.ts-b.ts);
  let h=`<div class="thread"><div class="rx">`;
  RX_SET.forEach(e=>{
    const set=rx[e]; const n=set?set.size:0; const on=set&&set.has(me);
    h+=`<button class="${on?'on':''}" onclick="toggleRx('${gid}','${cid}','${e}')">${e}${n?`<span class="n">${n}</span>`:''}</button>`;
  });
  h+=`</div>`;
  cmts.forEach(c=>{
    h+=`<div class="cmt"><span class="av" style="background:${avatarColor(c.author)}">${initials(c.author)}</span>
      <div class="body"><div class="who">${esc(c.author)}</div><div class="txt">${esc(c.text)}</div></div></div>`;
  });
  h+=`<div class="cmt-add">
        <input class="field" id="ct-${k}" placeholder="Écrire un mot…">
        <button class="btn small sage" onclick="addComment('${gid}','${cid}')">Envoyer</button>
      </div></div>`;
  return h;
}
async function toggleRx(gid,cid,emoji){ await pushEvent('reaction',{voter:me,group:gid,cat:cid,emoji}); }
async function addComment(gid,cid){
  const el=byId('ct-'+gid+'|'+cid); const t=el.value.trim(); if(!t) return;
  el.value='';
  await pushEvent('comment',{author:me,group:gid,cat:cid,text:t});
}

/* ---------- CLASSEMENT ---------- */
function renderClassement(){
  const revealed=MODEL.config.revealed;
  if(!revealed){ renderCloche(); return; }
  renderPodium();
}
function renderCloche(){
  const totalVotes=Object.keys(MODEL.votes).length;
  const totalComments=MODEL.comments.length;
  $('#scr-classement').innerHTML=`
    <div class="cloche-wrap">
      <div class="cloche">🍽️</div>
      <h2>Ça mijote…</h2>
      <p>Le classement reste <b>sous cloche</b> jusqu’à la révélation par les chefs. Continuez à voter et à commenter&nbsp;!</p>
      <div class="mijote">
        <div class="stat"><b>${totalVotes}</b><span>votes déposés</span></div>
        <div class="stat"><b>${totalComments}</b><span>commentaires</span></div>
      </div>
      ${isChef?`<div style="margin-top:26px"><button class="btn" style="background:var(--gold);color:var(--ink)" onclick="doReveal()">🔓 Révéler le classement</button></div>`
              :`<p style="margin-top:24px;font-size:13px">🔑 Réservé aux chefs.</p>`}
    </div>`;
}
function renderPodium(){
  const ranked=GROUPS.map(g=>({g,score:groupTotal(g.id)})).sort((a,b)=>b.score-a.score);
  const order=[ranked[1],ranked[0],ranked[2]]; // 2-1-3 pour le podium
  const rankClass={0:'r1',1:'r2',2:'r3'};
  const medal=r=>['🥇','🥈','🥉'][r];
  // podium
  let pod=`<div class="section-title"><h2>Le podium</h2><span class="sub">/ ${TOTAL_MAX} pts</span></div><div class="podium">`;
  order.forEach(item=>{
    const rank=ranked.indexOf(item);
    pod+=`<div class="pod ${rankClass[rank]}" style="animation-delay:${rank*.18}s">
      <div class="medal">${medal(rank)||''}</div>
      <div class="pname">${esc(item.g.name)}</div>
      <div class="pscore mono">${item.score.toFixed(1)}</div>
      <div class="block" style="background:${item.g.soft};border-color:${item.g.color}">${rank+1}</div>
    </div>`;
  });
  pod+=`</div>`;

  // meilleurs plats
  let best=`<div class="section-title"><h2>Meilleurs plats</h2></div><div class="best-grid">`;
  CATS.forEach(c=>{
    let win=null,bs=-1;
    GROUPS.forEach(g=>{ const s=catScores(g.id,c.id); if(s.n&&s.total>bs){bs=s.total;win=g;} });
    best+=`<div class="best-card">
      <div class="cat">${c.emoji} ${c.label}</div>
      ${win?`<div class="win"><span class="dot" style="background:${win.color}"></span>${esc(win.name)}</div>
             <div class="sc">${bs.toFixed(1)}/${CAT_MAX}</div>`
           :`<div class="win" style="color:var(--ink-soft);font-size:14px">Pas de vote</div>`}
    </div>`;
  });
  best+=`</div>`;

  // détail par équipe
  let detail=`<div class="section-title"><h2>Détail par équipe</h2></div>`;
  ranked.forEach((item,idx)=>{
    const g=item.g;
    detail+=`<div class="card" style="border-left:5px solid ${g.color}">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:6px">
        <span style="font-size:18px">${medal(idx)}</span>
        <span class="team-tag" style="background:${g.soft}"><span class="dot" style="background:${g.color}"></span>${esc(g.name)}</span>
        <span class="mono" style="margin-left:auto;font-weight:700;color:var(--plum)">${item.score.toFixed(1)}/${TOTAL_MAX}</span>
      </div><div class="breakdown">`;
    CATS.forEach(c=>{
      const s=catScores(g.id,c.id);
      detail+=`<div class="bd-row"><span class="lbl">${c.emoji} ${c.label}</span>
        <span class="bar"><i style="width:${s.total/CAT_MAX*100}%;background:${g.color}"></i></span>
        <span class="val">${s.n?s.total.toFixed(1):'–'}</span></div>`;
    });
    detail+=`</div></div>`;
  });

  let ctrl = isChef?`<div class="card" style="text-align:center"><button class="btn ghost small" style="width:100%" onclick="doHide()">🙈 Re-cacher le classement</button></div>`:'';

  $('#scr-classement').innerHTML=pod+best+detail+ctrl;
  fireConfetti();
}
async function doReveal(){
  if(!confirm('Révéler le classement à tout le monde ? C’est le grand moment 🎉')) return;
  await pushEvent('config',{key:'revealed',value:true});
  toast('Révélation ! 🎉'); go('classement');
}
async function doHide(){ await pushEvent('config',{key:'revealed',value:false}); toast('Classement re-caché'); }

/* ============================================================
   CONFETTI (léger, sans dépendance)
   ============================================================ */
let confettiRun=false;
function fireConfetti(){
  if(confettiRun) return; confettiRun=true;
  const cv=$('#confetti'); cv.style.display='block';
  const ctx=cv.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  cv.width=innerWidth*dpr; cv.height=innerHeight*dpr; ctx.scale(dpr,dpr);
  const cols=['#E7B94E','#C85A3C','#7C9473','#8FC7DD','#EDB588','#9FD8B4','#764B5B'];
  const P=Array.from({length:130},()=>({
    x:Math.random()*innerWidth, y:-20-Math.random()*innerHeight*0.4,
    r:5+Math.random()*7, c:cols[Math.random()*cols.length|0],
    vy:2+Math.random()*3.5, vx:-1.5+Math.random()*3, rot:Math.random()*6.28, vr:-.2+Math.random()*.4
  }));
  const t0=Date.now();
  (function loop(){
    ctx.clearRect(0,0,innerWidth,innerHeight);
    P.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vy+=0.02;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.c;
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*.6); ctx.restore();
    });
    if(Date.now()-t0<4200) requestAnimationFrame(loop);
    else { cv.style.display='none'; confettiRun=false; }
  })();
}

/* ============================================================
   NAV / WHOIS / ADMIN
   ============================================================ */
function go(tab){
  currentTab=tab;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('#scr-'+tab).classList.add('active');
  document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildWhois(){
  let h='';
  GROUPS.forEach(g=>{
    h+=`<div class="grp-block"><div class="head"><span class="dot" style="background:${g.color}"></span>${esc(g.name)}</div><div class="name-grid">`;
    g.members.forEach(n=>{ h+=nameBtn(n,g.color); });
    h+=`</div></div>`;
  });
  h+=`<div class="grp-block"><div class="head"><span class="dot" style="background:var(--plum)"></span>Jury / Chefs</div><div class="name-grid">`;
  STAFF.forEach(n=>{ h+=nameBtn(n,'#764B5B'); });
  h+=`</div></div>`;
  $('#whois-list').innerHTML=h;
}
function nameBtn(n,col){
  return `<button class="name-btn" onclick="pickMe('${esc(n)}')">
    <span class="av" style="background:${col}">${initials(n)}</span>${esc(n)}</button>`;
}
function openWhois(){ $('#whois').classList.add('show'); }
function pickMe(n){
  me=n; try{ localStorage.setItem('dpp_me',n); }catch(e){}
  $('#whois').classList.remove('show');
  isChef=false; // reset : le statut chef se re-débloque via code
  renderAll();
}

function openAdmin(){ renderAdmin(); $('#admin-sheet').classList.add('show','_open'); $('#sheet-back').classList.add('show'); }
function closeAdmin(){ $('#admin-sheet').classList.remove('show','_open'); $('#sheet-back').classList.remove('show'); }
function renderAdmin(){
  let h=`<div class="grab"></div>`;
  if(!isChef){
    h+=`<h3>Espace chef 🔑</h3><p>Entre le code pour débloquer la révélation du classement.</p>
      <input class="field" id="chef-code" inputmode="numeric" placeholder="Code" style="text-align:center;letter-spacing:.3em;font-size:20px;font-family:'Space Mono'">
      <button class="btn" style="margin-top:12px" onclick="tryCode()">Déverrouiller</button>`;
  }else{
    const revealed=MODEL.config.revealed;
    h+=`<h3>Espace chef ✅</h3><p>Tu peux gérer le grand moment.</p>
      ${revealed
        ?`<button class="btn ghost" onclick="doHide()">🙈 Re-cacher le classement</button>`
        :`<button class="btn" style="background:var(--gold);color:var(--ink)" onclick="doReveal();closeAdmin()">🔓 Révéler le classement</button>`}
      <button class="btn ghost" style="margin-top:10px" onclick="isChef=false;renderAdmin()">Verrouiller l’espace chef</button>`;
  }
  $('#admin-body').innerHTML=h;
}
function tryCode(){
  const v=($('#chef-code').value||'').trim();
  if(v==='123'){ isChef=true; toast('Espace chef débloqué'); renderAdmin(); renderAll(); }
  else toast('Code incorrect');
}

/* ============================================================
   BOOT
   ============================================================ */
async function boot(){
  buildWhois();
  if(OFFLINE) $('#offline-banner').style.display='flex';
  try{ me=localStorage.getItem('dpp_me')||null; }catch(e){}

  try{ await fetchState(); }catch(e){ console.warn('fetch fail',e); }
  stateReady=true;
  rebuild();

  // masque loading, montre app
  $('#loading').classList.add('hide');
  $('#app').classList.add('ready');
  setTimeout(()=>$('#loading').remove(),450);

  if(!me) openWhois();

  // polling (comme défis-pio : 8s), rebuild seulement si ça a changé
  if(!OFFLINE){
    let lastSig=sig();
    pollTimer=setInterval(async()=>{
      try{
        await fetchState();
        const s=sig();
        if(s!==lastSig){ lastSig=s; rebuild(); }
      }catch(e){}
    },8000);
  }
}
document.addEventListener('DOMContentLoaded',boot);
</script>
